<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全球點擊挑戰 - FR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        /* --- @FR科技公司版權所有 嚴禁轉載本網站所有程式碼 --- */
        html, body { height: 100%; margin: 0; padding: 0; background: linear-gradient(135deg, #0a0f1e 0%, #020205 100%); color: white; overflow-x: hidden; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
        body { display: flex; flex-direction: column; min-height: 100vh; font-family: 'Inter', "Microsoft JhengHei", sans-serif; box-sizing: border-box; padding-bottom: 80px; }

        /* --- 公告欄 --- */
        .announcement-bar { width: 100%; background: #000; border-bottom: 2px solid #007aff; padding: 10px 0; display: flex; align-items: center; overflow: hidden; position: sticky; top: 0; z-index: 1000; }
        .announcement-tag { background: #007aff; color: white; padding: 4px 15px; font-weight: 900; font-size: 14px; white-space: nowrap; margin-left: 10px; border-radius: 4px; z-index: 5; }
        .marquee-container { flex: 1; overflow: hidden; position: relative; display: flex; align-items: center; height: 20px; }
        .marquee-text { position: absolute; white-space: nowrap; color: #00f2ff; font-weight: 700; font-size: 14px; will-change: transform; animation: marquee-smooth 20s linear infinite; }
        @keyframes marquee-smooth { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        .container { width: 100%; padding: 20px 15px; display: flex; flex-direction: column; align-items: center; flex: 1; justify-content: flex-start; margin: 0; box-sizing: border-box; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); border-radius: 15px; }
        .info-bar { margin-bottom: 20px; padding: 12px 25px; text-align: center; width: 100%; box-sizing: border-box; }
        
        /* --- 計數器 --- */
        .odometer-wrapper { position: relative; width: 100%; max-width: 400px; padding: 15px 10px; margin-bottom: 30px; overflow: hidden; display: flex; justify-content: center; align-items: center; border-radius: 20px; box-sizing: border-box; }
        .odometer-wrapper::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, transparent 35%, #007aff 45%, #00f2ff 55%, transparent 70%); animation: fluid-rotate 10s linear infinite; z-index: 0; opacity: 0.2; filter: blur(20px); }
        @keyframes fluid-rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .odometer { position: relative; z-index: 1; display: flex; justify-content: center; align-items: center; font-size: 55px; font-weight: 900; height: 100px; line-height: 100px; overflow: hidden; letter-spacing: -3px; text-shadow: 0 0 15px rgba(0, 242, 255, 0.5); }
        .digit-box { height: 100px; width: 38px; position: relative; overflow: hidden; display: none; }
        .digit-box.active { display: block; }
        .digit-list { position: absolute; width: 100%; transition: transform 0.6s cubic-bezier(0.45, 0.05, 0.55, 0.95); top: 0; left: 0; }
        .digit-list div { height: 100px; text-align: center; }
        .comma { width: 12px; text-align: center; font-size: 45px; color: #fff; display: none; padding-top: 5px; font-weight: 900; }
        .comma.active { display: block; }
        
        /* --- 按鈕 --- */
        .white-btn { outline: none; border: 1px solid #00f2ff; cursor: pointer; background: linear-gradient(135deg, #007aff 0%, #0045ff 100%); color: #fff; padding: 18px 0; width: 100%; max-width: 320px; font-size: 26px; font-weight: 900; border-radius: 100px; transition: 0.2s; box-shadow: 0 4px 15px rgba(0, 122, 255, 0.5); -webkit-tap-highlight-color: transparent; }
        .white-btn:active { transform: scale(0.95); }
        .firework-p { position: fixed; pointer-events: none; z-index: 100; animation: fw-explode 1s ease-out forwards; width: 4px; height: 4px; border-radius: 50%; background: #00f2ff; box-shadow: 0 0 5px #00f2ff; }
        @keyframes fw-explode { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--ex), var(--ey)) scale(0); opacity: 0; } }

        /* --- 數據卡片 --- */
        .dashboard-card { padding: 20px; width: 100%; margin-top: 20px; box-sizing: border-box; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #007aff, #00f2ff, #007aff); background-size: 200% 100%; animation: gradient-move 3s linear infinite; box-shadow: 0 0 10px #00f2ff; }
        @keyframes gradient-move { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

        /* --- 廣告與後台 --- */
        .dynamic-ad-box { width: 100%; margin-top: 30px; min-height: 180px; padding: 30px 20px; text-align: center; box-sizing: border-box; display: flex; align-items: center; justify-content: center; }
        #adAdminPanel { display: none; margin-top: 15px; padding: 15px; background: rgba(0,0,0,0.8); border: 1px solid #00f2ff; border-radius: 10px; width: 90%; }
        textarea { width: 100%; background: #111; color: #00f2ff; border: 1px solid #333; padding: 10px; border-radius: 5px; }

        .footer { width: 100%; margin-top: auto; padding: 30px 0; border-top: 1px solid rgba(255, 255, 255, 0.05); display: flex; flex-direction: column; align-items: center; gap: 15px; background: rgba(0,0,0,0.2); }
        .footer-logo { max-width: 200px; opacity: 0.6; pointer-events: auto; }
    </style>
</head>
<body>

<div class="announcement-bar">
    <div class="announcement-tag" id="ui-ann">公告</div>
    <div class="marquee-container"><div class="marquee-text" id="topMarqueeText">SYSTEM INITIALIZING...</div></div>
</div>

<div class="container">
    <div class="info-bar glass-panel">
        <div style="font-size: 13px; color: #00f2ff; font-weight: 900;"><span id="onlineText">Connecting...</span></div>
        <div style="font-size: 11px; color: #aaa;"><span id="ui-srv">伺服器時間</span>：<span id="nyTime">--:--:--</span></div>
        <div style="font-size: 10px; color: #888;"><span id="ui-visit">累計瀏覽</span>：<span id="visitCount">0</span></div>
    </div>
    
    <div id="ui-title" style="font-size: 15px; color: #fff; font-weight: 900; letter-spacing: 5px; margin-bottom: 10px; text-align: center;">RYFN GLOBAL CHALLENGE</div>
    
    <div class="odometer-wrapper glass-panel"><div id="roller" class="odometer"></div></div>
    
    <button id="ui-btn" class="white-btn" onclick="handleClick(event)">立即點擊 PUSH</button>

    <div class="dashboard-card glass-panel">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <span id="ui-db" style="font-size:12px; font-weight:900; color:#aaa;">數據儀表板</span>
            <span id="percentText" style="font-size:12px; color:#00f2ff; font-weight:900;">0.000%</span>
        </div>
        <div style="width:100%; height:10px; background:rgba(255,255,255,0.05); border-radius:10px; overflow:hidden;">
            <div id="fillBar" class="progress-fill"></div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top: 15px;">
            <div style="background:rgba(255,255,255,0.02); padding:10px; border-radius:8px;">
                <div id="ui-rem" style="font-size:9px; color:#888;">REMAINING</div>
                <div id="remainingValue" style="font-size:15px; font-weight:900;">----</div>
            </div>
            <div style="background:rgba(255,255,255,0.02); padding:10px; border-radius:8px;">
                <div id="ui-rate" style="font-size:9px; color:#888;">達成率</div>
                <div style="font-size:15px; font-weight:900; color:#00f2ff;">LIVE</div>
            </div>
        </div>
    </div>

    <div class="dynamic-ad-box glass-panel"><div id="adBoxContent">廣告載入中...</div></div>
    
    <div id="adAdminPanel">
        <h4 style="margin:0 0 10px 0; color:#fff;">廣告後台編輯</h4>
        <textarea id="adInput" rows="3" placeholder="輸入廣告文字..."></textarea>
        <button onclick="updateAd()" style="margin-top:10px; width:100%; background:#007aff; color:white; border:none; padding:8px; border-radius:5px;">更新並上傳</button>
    </div>
</div>

<footer class="footer" id="footerArea">
    <img src="https://cdn.discordapp.com/attachments/1400476609034850465/1461944229755355329/Background_Eraser.jpeg?ex=696c6529&is=696b13a9&hm=660338d70f2fa11365b3b45aff02676095129afc2017e28cf282086e6e26b160&" class="footer-logo" id="secretTrigger">
    <div style="font-size:10px; color:#666;">© 2026 FR科技公司網站科技部門A102 | <span id="ui-sys">系統架構</span>：Ryfn888</div>
</footer>

<script>
    /* --- 安全防護：禁止右鍵、F12、Ctrl+U --- */
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
        if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'u') || (e.ctrlKey && e.key === 's')) {
            e.preventDefault();
            return false;
        }
    });

    const firebaseConfig = {
        apiKey: "AIzaSyAhstatd52tItPyVGs0yFpMr72r9yFpVY",
        authDomain: "project-3642988709307035960.firebaseapp.com",
        databaseURL: "https://project-3642988709307035960-default-rtdb.firebaseio.com",
        projectId: "project-3642988709307035960",
        appId: "1:119344257869:web:4e9c095e23eaa7bb1db504"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1344243689366487050/m-9t5P-T-A-R-S-M-E-D-I-A-P-U-S-H"; // 示意

    // 目標設定
    const TARGET_GOAL = 10000000;

    // 開發者後台觸發 (點擊Logo 6下)
    let secretCount = 0;
    document.getElementById('secretTrigger').onclick = () => {
        secretCount++;
        if(secretCount === 6) {
            let pw = prompt("請輸入管理員密鑰：");
            if(pw === "666777") {
                document.getElementById('adAdminPanel').style.display = 'block';
                alert("廣告編輯框已跳出");
            }
            secretCount = 0;
        }
    };

    function updateAd() {
        const txt = document.getElementById('adInput').value;
        db.ref('admin_settings/ads/ad1').update({ text: txt });
        alert("更新成功");
    }

    // 點擊處理與 Discord 同步
    function handleClick(e) {
        db.ref('global_counter').transaction(c => (c || 0) + 1);
        
        // 同步媒體按鈕+1訊息到 Discord
        fetch(DISCORD_WEBHOOK, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ content: "🚀 **媒體按鈕觸發**：全域點擊次數 +1" })
        }).catch(err => console.log("Webhook 傳送稍緩"));

        // 特效
        const cx = (e.clientX || (e.touches && e.touches[0].clientX));
        const cy = (e.clientY || (e.touches && e.touches[0].clientY));
        for (let i = 0; i < 6; i++) {
            const p = document.createElement('div'); p.className = 'firework-p';
            p.style.left = cx + 'px'; p.style.top = cy + 'px';
            p.style.setProperty('--ex', (Math.random() * 200 - 100) + 'px');
            p.style.setProperty('--ey', (Math.random() * 200 - 100) + 'px');
            document.body.appendChild(p); p.onanimationend = () => p.remove();
        }
    }

    // 計數器渲染邏輯
    function initRoller() {
        const r = document.getElementById('roller'); r.innerHTML = "";
        for (let i = 0; i < 11; i++) { // 支援到千萬位
            if (i > 0 && i % 3 === 0) { const c = document.createElement('div'); c.className = "comma"; c.id = `comma-${i}`; c.innerText = ","; r.insertBefore(c, r.firstChild); }
            const b = document.createElement('div'); b.className = "digit-box"; b.id = `box-${i}`;
            let l = `<div class="digit-list" id="list-${i}">`;
            for (let j = 0; j <= 9; j++) l += `<div>${j}</div>`;
            l += `<div>0</div></div>`; b.innerHTML = l; r.insertBefore(b, r.firstChild);
        }
    }
    initRoller();

    function render(num) {
        let s = num.toString().padStart(11, "0");
        for (let i = 0; i < 11; i++) {
            const box = document.getElementById(`box-${i}`);
            const list = document.getElementById(`list-${i}`);
            const val = parseInt(s[s.length - 1 - i]);
            if (i < num.toString().length) {
                box.classList.add('active');
                if (i % 3 === 0 && i > 0) {
                    const c = document.getElementById(`comma-${i}`);
                    if(c) c.classList.add('active');
                }
                list.style.transform = `translateY(-${val * 100}px)`;
            }
        }
        const pct = Math.min((num/TARGET_GOAL)*100, 100).toFixed(3);
        document.getElementById('percentText').innerText = pct + "%";
        document.getElementById('fillBar').style.width = pct + "%";
        document.getElementById('remainingValue').innerText = Math.max(TARGET_GOAL-num, 0).toLocaleString();
    }

    // Firebase 數據監聽
    db.ref('global_counter').on('value', s => render(s.val() || 0));
    db.ref('visit_count').transaction(c => (c || 0) + 1);
    db.ref('visit_count').on('value', s => document.getElementById('visitCount').innerText = (s.val() || 0).toLocaleString());
    db.ref('presence').on('value', s => { document.getElementById('onlineText').innerText = s.numChildren() + " Online"; });

    // 時間同步
    setInterval(() => {
        const opt = { timeZone: 'America/New_York', hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' };
        document.getElementById('nyTime').innerText = new Intl.DateTimeFormat('zh-TW', opt).format(new Date());
    }, 1000);

    // 廣告旋轉 (從 Firebase 讀取)
    db.ref('admin_settings/ads/ad1').on('value', s => {
        const data = s.val();
        if(data) document.getElementById('adBoxContent').innerText = data.text;
    });
</script>
</body>
</html>
