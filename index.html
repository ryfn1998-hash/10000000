<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全球點擊挑戰 - FR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        /* --- @FR科技公司版權所有 嚴禁轉載本網站所有程式碼 --- */
        html, body { height: 100%; margin: 0; padding: 0; background: linear-gradient(135deg, #0a0f1e 0%, #020205 100%); color: white; overflow-x: hidden; }
        body { display: flex; flex-direction: column; min-height: 100vh; font-family: 'Inter', "Microsoft JhengHei", sans-serif; box-sizing: border-box; padding-bottom: 80px; }

        /* --- 公告欄 (100% 滿版) --- */
        .announcement-bar { width: 100%; background: #000; border-bottom: 2px solid #007aff; padding: 10px 0; display: flex; align-items: center; overflow: hidden; position: sticky; top: 0; z-index: 1000; }
        .announcement-tag { background: #007aff; color: white; padding: 4px 15px; font-weight: 900; font-size: 14px; white-space: nowrap; margin-left: 10px; border-radius: 4px; z-index: 5; }
        .marquee-container { flex: 1; overflow: hidden; position: relative; display: flex; align-items: center; height: 20px; }
        .marquee-text { position: absolute; white-space: nowrap; color: #00f2ff; font-weight: 700; font-size: 14px; will-change: transform; animation: marquee-smooth 20s linear infinite; }
        @keyframes marquee-smooth { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        /* --- @FR科技公司版權所有 嚴禁轉載本網站所有程式碼 --- */
        .container { 
            width: 100%; 
            padding: 20px 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            flex: 1; 
            justify-content: flex-start; 
            margin: 0; 
            box-sizing: border-box; 
        }

        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); border-radius: 15px; }
        .info-bar { margin-bottom: 20px; padding: 12px 25px; text-align: center; width: 100%; box-sizing: border-box; }
        
        /* --- 計數器 --- */
        .odometer-wrapper { position: relative; width: 100%; max-width: 400px; padding: 15px 10px; margin-bottom: 30px; overflow: hidden; display: flex; justify-content: center; align-items: center; border-radius: 20px; box-sizing: border-box; }
        .odometer-wrapper::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, transparent 35%, #007aff 45%, #00f2ff 55%, transparent 70%); animation: fluid-rotate 10s linear infinite; z-index: 0; opacity: 0.2; filter: blur(20px); }
        @keyframes fluid-rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .odometer { position: relative; z-index: 1; display: flex; justify-content: center; align-items: center; font-size: 65px; font-weight: 900; height: 100px; line-height: 100px; overflow: hidden; letter-spacing: -3px; text-shadow: 0 0 15px rgba(0, 242, 255, 0.5); }
        .digit-box { height: 100px; width: 45px; position: relative; overflow: hidden; display: none; }
        .digit-box.active { display: block; }
        .digit-list { position: absolute; width: 100%; transition: transform 0.6s cubic-bezier(0.45, 0.05, 0.55, 0.95); top: 0; left: 0; }
        .digit-list div { height: 100px; text-align: center; }
        .comma { width: 15px; text-align: center; font-size: 55px; color: #fff; display: none; padding-top: 5px; font-weight: 900; }
        .comma.active { display: block; }
        
        /* --- 按鈕 --- */
        .white-btn { outline: none; border: 1px solid #00f2ff; cursor: pointer; background: linear-gradient(135deg, #007aff 0%, #0045ff 100%); color: #fff; padding: 18px 0; width: 100%; max-width: 320px; font-size: 26px; font-weight: 900; border-radius: 100px; transition: 0.2s; box-shadow: 0 4px 15px rgba(0, 122, 255, 0.5); }
        .white-btn:active { transform: scale(0.95); }
        .firework-p { position: fixed; pointer-events: none; z-index: 100; animation: fw-explode 1s ease-out forwards; width: 4px; height: 4px; border-radius: 50%; background: #00f2ff; box-shadow: 0 0 5px #00f2ff; }
        @keyframes fw-explode { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--ex), var(--ey)) scale(0); opacity: 0; } }

        /* --- 數據卡片與排行榜 --- */
        .dashboard-card, .leaderboard-card { padding: 20px; width: 100%; margin-top: 20px; box-sizing: border-box; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #007aff, #00f2ff, #007aff); background-size: 200% 100%; animation: gradient-move 3s linear infinite; box-shadow: 0 0 10px #00f2ff; }
        @keyframes gradient-move { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        .leaderboard-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 10px; font-size: 13px; }
        .rank-1 { border: 1px solid rgba(0, 242, 255, 0.3); background: rgba(0, 122, 255, 0.08); }

        /* --- 廣告盒 --- */
        .dynamic-ad-box { width: 100%; margin-top: 30px; min-height: 180px; padding: 30px 20px; text-align: center; box-sizing: border-box; display: flex; align-items: center; justify-content: center; transition: background 0.8s ease; }
        #adBoxContent { font-size: 24px; font-weight: 900; color: #fff; text-shadow: 0 0 10px rgba(0,0,0,0.5); white-space: pre-wrap; transition: opacity 0.5s; }

        /* --- 比特幣彈窗 --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 3000; display: none; justify-content: center; align-items: center; padding: 20px; opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.open { display: flex; opacity: 1; }
        .btc-modal { width: 100%; max-width: 350px; padding: 30px 20px; text-align: center; box-sizing: border-box; transform: scale(0.8); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .modal-overlay.open .btc-modal { transform: scale(1); }
        .address-container { background: rgba(0,0,0,0.5); border-radius: 12px; padding: 18px 10px; border: 1px solid rgba(247, 147, 26, 0.3); cursor: pointer; position: relative; margin-top: 15px; }
        .copy-toast { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); background: #f7931a; color: white; font-size: 12px; padding: 4px 12px; border-radius: 20px; opacity: 0; transition: 0.3s; }
        .address-container.copied .copy-toast { opacity: 1; transform: translateX(-50%) translateY(-5px); }

        /* --- 懸浮鈕與頁尾 --- */
        .fab-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 2000; }
        .fab-btn { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 4px 15px rgba(0,0,0,0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
        .btn-btc { background: rgba(247, 147, 26, 0.3); color: #f7931a; font-size: 24px; font-weight: 900; }
        .btn-discord { background: rgba(88, 101, 242, 0.3); }
        .btn-discord svg { width: 24px; height: 24px; fill: white; }
        .footer { width: 100%; margin-top: auto; padding: 30px 0; border-top: 1px solid rgba(255, 255, 255, 0.05); display: flex; flex-direction: column; align-items: center; gap: 15px; background: rgba(0,0,0,0.2); backdrop-filter: blur(5px); }
        .footer-logo { max-width: 200px; opacity: 0.6; }
    </style>
</head>
<body onload="autoLang()">

<div class="announcement-bar">

    <div class="marquee-container">

<div class="container">

        <div style="font-size: 13px; color: #00f2ff; font-weight: 900;"><span id="onlineText">Connecting...</span></div>
        <div style="font-size: 11px; color: #aaa;"><span id="ui-srv">伺服器時間</span>：<span id="nyTime">--:--:--</span></div>

</div>

<div class="modal-overlay" id="btcModalOverlay" onclick="closeBtcModal()">
    <div class="btc-modal glass-panel" onclick="event.stopPropagation()">
        <div style="font-size: 18px; font-weight: 900; color: #f7931a; margin-bottom: 10px;">DONATE BTC</div>
        <div class="address-container" onclick="copyBtcAddress()">
            <div class="copy-toast">已複製地址！</div>
            <div style="font-size: 11px; color: #ddd; font-family: monospace; word-break: break-all;">bc1qtsc3kpt5uy5h496v5v9g2h20654dl4mzm4q265</div>
        </div>
        <button onclick="closeBtcModal()" style="margin-top: 20px; background: none; border: 1px solid rgba(255,255,255,0.2); color: #888; padding: 5px 15px; border-radius: 5px; cursor: pointer;">關閉</button>
    </div>
</div>

<footer class="footer">
    <img src="https://lh3.googleusercontent.com/sitesv/AA5AbUBAfF2PN08klwvE-keX7ds7_QqGtgm8mUXXLdqSMhADL33Wjf4OmykQJ0V1P18_D34VDqeWFWWJaWAy1P_GE8L8eGElzZR0tdM_g1SY2erlWJGXhuoDqPpqHU7P3Caf-_rvjOOZQs0Ap332_9IFcTsU_AbQHP3oH4H7mYIVIGeNEEym-nyZ_Q5Kd1nGPuEkmLmqrIwMS3iAaVfGiLY4J4dJSTA8lY2WT95c=w1280" class="footer-logo">
    <div style="font-size:10px; color:#666;">© 2026 FR科技公司網站科技部門A102 | <span id="ui-sys">系統架構</span>：Ryfn888</div>
</footer>

<script>
    /* --- 安全防護：隱藏原始碼檢查 (F12, Ctrl+U) --- */
    document.addEventListener('keydown', function(e) {
        if (e.key === 'F12' || (e.ctrlKey && e.key === 'u')) {
            e.preventDefault();
        }
    });
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
    });

    const firebaseConfig = {
        apiKey: "AIzaSyAhstatd52tItPyVGs0yFpMr72r9yFpVY",
        authDomain: "project-3642988709307035960.firebaseapp.com",
        databaseURL: "https://project-3642988709307035960-default-rtdb.firebaseio.com",
        projectId: "project-3642988709307035960",
        appId: "1:119344257869:web:4e9c095e23eaa7bb1db504"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    /* --- 後台功能已刪除 --- */
    
    // 跑馬燈
    db.ref('admin_settings/marquee_text').on('value', s => {
        const el = document.getElementById('topMarqueeText');
        el.innerText = s.val() || "Welcome to Global Challenge.";
        el.style.animation = 'none'; el.offsetHeight; el.style.animation = 'marquee-smooth 20s linear infinite';
    });

    // 在線人數
    const presenceRef = db.ref('presence');
    const pres = presenceRef.push();
    db.ref('.info/connected').on('value', s => { if(s.val()) { pres.onDisconnect().remove(); pres.set(true); } });
    presenceRef.on('value', s => { document.getElementById('onlineText').innerText = s.numChildren() + " Online"; });

    // 點擊處理與 Discord 同步
    let userCountry = "TW";
    fetch('https://ipapi.co/json/').then(r => r.json()).then(d => userCountry = d.country_code || "TW");

    function handleClick(e) {
        db.ref('global_counter').transaction(c => (c || 0) + 1);
        db.ref('country_stats').child(userCountry).transaction(c => (c || 0) + 1);
        
        // Discord 同步：每按一下發送「+1」
        const webhookURL = "https://discord.com/api/webhooks/1461395001186455736/MSfqtakA7XsGctMs68uCOPs5zlKYzn_AZcD8OepdoU9Lfyaobt8eo0BSOh4JxGAmbiD6";
        fetch(webhookURL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ content: "+1" })
        }).catch(err => {});

        const cx = (e.clientX || (e.touches && e.touches[0].clientX));
        const cy = (e.clientY || (e.touches && e.touches[0].clientY));
        for (let i = 0; i < 6; i++) {
            const p = document.createElement('div'); p.className = 'firework-p';
            p.style.left = cx + 'px'; p.style.top = cy + 'px';
            p.style.setProperty('--ex', (Math.random() * 200 - 100) + 'px');
            p.style.setProperty('--ey', (Math.random() * 200 - 100) + 'px');
            document.body.appendChild(p); p.onanimationend = () => p.remove();
        }
    }

    // 排行榜
    db.ref('country_stats').on('value', s => {
        const list = document.getElementById('leaderboardList');
        const sorted = Object.entries(s.val() || {}).sort((a,b) => b[1]-a[1]).slice(0,5);
        list.innerHTML = sorted.map(([code, val], i) => `
            <div class="leaderboard-item ${i===0?'rank-1':''}">
                <div><b>${i+1}.</b> ${code}</div>
                <div style="color:#00f2ff; font-weight:900;">${val.toLocaleString()}</div>
            </div>`).join('');
    });

    // 廣告輪播
    let adList = []; let currentAdIdx = 0; let adTimer = null;
    db.ref('admin_settings/ads').on('value', s => {
        adList = s.val() ? Object.values(s.val()) : [];
        if (adList.length > 0 && !adTimer) rotateAds();
    });
    function rotateAds() {
        if (adList.length === 0) return;
        const ad = adList[currentAdIdx];
        const content = document.getElementById('adBoxContent');
        const box = document.querySelector('.dynamic-ad-box');
        content.style.opacity = 0;
        setTimeout(() => {
            content.innerText = ad.text || "SYSTEM READY"; content.style.opacity = 1;
            if (ad.color1 && ad.color2) box.style.background = `linear-gradient(-45deg, ${ad.color1}, ${ad.color2})`;
            else box.style.background = "rgba(255,255,255,0.03)";
        }, 500);
        adTimer = setTimeout(() => { currentAdIdx = (currentAdIdx + 1) % adList.length; rotateAds(); }, (ad.duration || 5) * 1000);
    }

    // 計數器
    function initRoller() {
        const r = document.getElementById('roller'); r.innerHTML = "";
        for (let i = 0; i < 10; i++) {
            if (i > 0 && i % 3 === 0) { const c = document.createElement('div'); c.className = "comma"; c.id = `comma-${i}`; c.innerText = ","; r.insertBefore(c, r.firstChild); }
            const b = document.createElement('div'); b.className = "digit-box"; b.id = `box-${i}`;
            let l = `<div class="digit-list" id="list-${i}">`;
            for (let j = 0; j <= 9; j++) l += `<div>${j}</div>`;
            l += `<div>0</div></div>`; b.innerHTML = l; r.insertBefore(b, r.firstChild);
        }
    }
    initRoller();

    function render(num) {
        let s = num.toString().padStart(10, "0");
        for (let i = 0; i < 10; i++) {
            const box = document.getElementById(`box-${i}`);
            const list = document.getElementById(`list-${i}`);
            const val = parseInt(s[s.length - 1 - i]);
            if (i < num.toString().length) {
                box.classList.add('active');
                if (i % 3 === 0 && i > 0) document.getElementById(`comma-${i}`).classList.add('active');
                list.style.transform = `translateY(-${val * 100}px)`;
            }
        }
        const target = 10000000;
        const pct = Math.min((num/target)*100, 100).toFixed(2);
        document.getElementById('percentText').innerText = pct + "%";
        document.getElementById('fillBar').style.width = pct + "%";
        document.getElementById('remainingValue').innerText = Math.max(target-num, 0).toLocaleString();
    }

    db.ref('global_counter').on('value', s => render(s.val() || 0));
    db.ref('visit_count').transaction(c => (c || 0) + 1);
    db.ref('visit_count').on('value', s => document.getElementById('visitCount').innerText = (s.val() || 0).toLocaleString());

    // 彈窗
    function openBtcModal() { document.getElementById('btcModalOverlay').classList.add('open'); }
    function closeBtcModal() { document.getElementById('btcModalOverlay').classList.remove('open'); }
    function copyBtcAddress() {
        navigator.clipboard.writeText("bc1qtsc3kpt5uy5h496v5v9g2h20654dl4mzm4q265");
        const container = document.querySelector('.address-container');
        container.classList.add('copied');
        setTimeout(() => container.classList.remove('copied'), 2000);
    }

    function autoLang() {
        const lang = navigator.language.split('-')[0] === 'zh' ? 'zh' : 'en';
        const d = { 
            zh: { ann: "公告", srv: "伺服器時間", visit: "累計瀏覽", db: "數據儀表板", rem: "剩餘目標", sys: "系統架構", rank: "🏆 排行榜" }, 
            en: { ann: "NEWS", srv: "Server Time", visit: "Total Visits", db: "DASHBOARD", rem: "REMAINING", sys: "Architecture", rank: "🏆 Ranking" } 
        };
        const cur = d[lang];
        Object.keys(cur).forEach(k => { if(document.getElementById(`ui-${k}`)) document.getElementById(`ui-${k}`).innerText = cur[k]; });
    }
    setInterval(() => {
        const opt = { timeZone: 'America/New_York', hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' };
        document.getElementById('nyTime').innerText = new Intl.DateTimeFormat('zh-TW', opt).format(new Date());
    }, 1000);
</script>
</body>
</html>
